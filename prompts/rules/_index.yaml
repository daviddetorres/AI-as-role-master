# Ordered list of rule sets. id = directory name under prompts/rules/
- id: dnd
  title: Dungeons & Dragons
  intro: Rule set based on Dungeons & Dragons.

- id: dice-pool
  title: Dice pool RPGs
  intro: Rule set based on dice pool systems (like World of Darkness, Shadowrun, etc.).

- id: disco-elysium
  title: Disco Elysium-like RPGs
  intro: Rule set based on Disco Elysium, with inner voices and skills.

- id: pokemon
  title: Pokemon-like RPGs
  intro: Rule set based on Pokemon-like RPGs. Capture and train creatures to battle.

- id: conversational
  title: Conversational adventures (graphic adventures, text adventures, interactive fiction...)
  intro: Rule set based on conversational adventures (graphic adventures, text adventures, interactive fiction...).

- id: deduction-detective
  title: Deduction detective games
  intro: Rule set based on deduction detective games (like Sherlock Holmes, Agatha Christie novels, etc.). You will have to gather clues, interview suspects, and solve mysteries. The game will set up a mystery and you will have to solve it using your deduction skills.

- id: fallout
  title: Fallout-like RPG
  intro: Rule set based on Fallout-like RPGs.

- id: social-simulation
  title: Social simulation game
  intro: Social simulation game where the player navigates complex social environments, builds relationships, and manages social status. No combat or physical challenges, but a lot of dialogue and decision-making.

- id: changing-the-past
  title: Changing the past
  intro: Social simulation game where the player can go back in time and change past social interactions to alter relationships and outcomes. Similar to games like "Life is Strange" or films like "The Butterfly Effect".

- id: system-call-world-dungeon
  title: SYSTEM CALL — World Dungeon (Earth Season)
  intro: LitRPG dungeon crawl broadcast as intergalactic reality TV, aligned with Dungeon Crawler Carl–style Syndicate rules (wetware HUD, ratings, sponsors, floor timers, safe rooms). Dark comedy, high lethality.
